#Feh tweaks
windowrule = match:class ^(feh)$, float on
windowrule = match:class ^(feh)$, size 1440 1000
windowrule = match:class ^(feh)$, center on

#dragon tweaks
windowrule = match:class ^(dragon)$, float on
windowrule = match:class ^(dragon)$, center on

#xdg portal rule
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, center on
windowrule = match:class ^(xdg-desktop-portal-gtk)$, size 760 760

#vlc tweaks
windowrule = match:class ^(vlc)$, float on
windowrule = match:class ^(vlc)$, size 1440 1000
windowrule = match:class ^(vlc)$, center on

#Rule to blur quickshell bar
layerrule = blur on, match:namespace bar
#Rule to blur rofi
layerrule = blur on, match:namespace rofi
