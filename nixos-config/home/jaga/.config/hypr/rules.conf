##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Float the windows
windowrule = match:class ^(feh)$, float on
windowrule = match:class ^(sxiv)$, float on
# Set the preset size (1440 width, 1000 height)
windowrule = match:class ^(feh)$, size 1440 1000
windowrule = match:class ^(sxiv)$, size 1440 1000
# Center the windows
windowrule = match:class ^(feh)$, center on
windowrule = match:class ^(sxiv)$, center on
